kind = "web"
previewPath = "/"
title = "Helix Protocol"
version = "1.0.0"
id = "artifacts/helix-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22054

[services.development]
run = "pnpm --filter @workspace/helix-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/helix-app", "run", "build" ]
publicDir = "artifacts/helix-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22054"
BASE_PATH = "/"
